name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  RELEASE_TAG: deps

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (no submodules)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Fix broken submodules and init
        run: |
          git ls-files --stage | grep 160000 | awk '{print $4}' | while IFS= read -r sm_path; do
            url=$(git config -f .gitmodules --get "submodule.${sm_path}.url" 2>/dev/null || true)
            if [ -z "$url" ]; then
              echo "Removing broken submodule reference: $sm_path"
              git rm --cached "$sm_path" 2>/dev/null || true
              rm -rf ".git/modules/${sm_path}" 2>/dev/null || true
            fi
          done
          sed -i 's|git@github.com:AAswordman/OperitNightlyRelease.git|https://github.com/AAswordman/OperitNightlyRelease.git|g' .gitmodules
          git submodule update --init --recursive
          # bullet3 is missing from .gitmodules but required by mmd/CMakeLists.txt
          if [ ! -f "mmd/third_party/bullet3/CMakeLists.txt" ]; then
            echo "Cloning bullet3 (missing submodule)..."
            git clone https://github.com/bulletphysics/bullet3.git mmd/third_party/bullet3
            cd mmd/third_party/bullet3
            git checkout 63c4d67e337017f9d8b298c900e9aabdb69296e7
            cd -
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK & Build Tools
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;25.1.8937393"

      - name: Download deps from GitHub Release
        run: |
          mkdir -p /tmp/deps
          REPO=${{ github.repository }}
          for f in models.zip subpack.zip jniLibs.zip libs.zip; do
            echo "Downloading $f from Release..."
            curl -sL -o "/tmp/deps/$f" \
              "https://github.com/${REPO}/releases/download/${{ env.RELEASE_TAG }}/$f"
            echo "$f $(du -h /tmp/deps/$f | cut -f1)"
          done
          echo "--- All deps ---"
          ls -lh /tmp/deps/

      - name: Place native libs
        run: |
          # All zip files contain full project-relative paths (app/src/main/...)
          # so extract to project root; use || true to tolerate extra-bytes warnings
          unzip -o /tmp/deps/models.zip -d . || true
          unzip -o /tmp/deps/subpack.zip -d . || true
          unzip -o /tmp/deps/jniLibs.zip -d . || true
          unzip -o /tmp/deps/libs.zip -d . || true
          echo "--- Verify ---"
          ls -l app/src/main/assets/models/ || true
          ls -l app/src/main/assets/subpack/ || true
          ls -l app/src/main/jniLibs/ || true
          ls -l app/libs/ || true

      - name: Create local.properties
        run: echo "GITHUB_CLIENT_ID=" > local.properties

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm & root deps
        run: |
          npm install -g pnpm
          npm install

      - name: Install web-chat deps
        run: npm --prefix web-chat install

      - name: Build web-chat
        run: npm run build:webchat

      - name: Sync example packages
        run: python3 ./sync_example_packages.py

      - name: Build Debug APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
