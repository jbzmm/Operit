name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  RELEASE_TAG: deps

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (no submodules)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Fix broken submodules and init
        run: |
          git ls-files --stage | grep 160000 | awk '{print $4}' | while IFS= read -r sm_path; do
            url=$(git config -f .gitmodules --get "submodule.${sm_path}.url" 2>/dev/null || true)
            if [ -z "$url" ]; then
              echo "Removing broken submodule reference: $sm_path"
              git rm --cached "$sm_path" 2>/dev/null || true
              rm -rf ".git/modules/${sm_path}" 2>/dev/null || true
            fi
          done
          sed -i 's|git@github.com:AAswordman/OperitNightlyRelease.git|https://github.com/AAswordman/OperitNightlyRelease.git|g' .gitmodules
          git submodule update --init --recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK & Build Tools
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;25.1.8937393"

      - name: Download deps from GitHub Release
        run: |
          mkdir -p /tmp/deps
          REPO=${{ github.repository }}
          for f in models.zip subpack.zip jniLibs.zip libs.zip; do
            echo "Downloading $f from Release..."
            STATUS=$(curl -sL -o "/tmp/deps/$f" -w "%{http_code}" \
              "https://github.com/${REPO}/releases/download/${{ env.RELEASE_TAG }}/$f")
            if [ "$STATUS" = "200" ]; then
              echo "OK: $f ($(du -h /tmp/deps/$f | cut -f1))"
            else
              echo "WARN: $f not in Release (HTTP $STATUS)"
              rm -f "/tmp/deps/$f"
            fi
          done
          echo "--- Downloaded ---"
          ls -lh /tmp/deps/

      - name: Fallback missing deps from Google Drive
        run: |
          pip install gdown
          MISSING=0
          for f in models.zip subpack.zip jniLibs.zip libs.zip; do
            if [ ! -s "/tmp/deps/$f" ]; then
              MISSING=1
              echo "$f missing, will download from Google Drive"
            fi
          done
          if [ "$MISSING" = "1" ]; then
            gdown --folder "https://drive.google.com/drive/folders/1g-Q_i7cf6Ua4KX9ZM6V282EEZvTVVfF7?usp=sharing" -O /tmp/deps --remaining-ok
          fi
          echo "--- Final deps ---"
          ls -lh /tmp/deps/

      - name: Place native libs
        run: |
          rm -f app/src/main/assets/models/.keep
          rm -f app/src/main/assets/subpack/.keep
          rm -f app/src/main/jniLibs/.keep

          unzip -o /tmp/deps/models.zip -d app/src/main/assets/models/
          unzip -o /tmp/deps/subpack.zip -d app/src/main/assets/subpack/
          unzip -o /tmp/deps/jniLibs.zip -d app/src/main/jniLibs/
          unzip -o /tmp/deps/libs.zip -d app/libs/

      - name: Create local.properties
        run: echo "GITHUB_CLIENT_ID=" > local.properties

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm & root deps
        run: |
          npm install -g pnpm
          npm install

      - name: Install web-chat deps
        run: npm --prefix web-chat install

      - name: Build web-chat
        run: npm run build:webchat

      - name: Sync example packages
        run: python3 ./sync_example_packages.py

      - name: Build Debug APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
